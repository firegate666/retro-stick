# RetroStick — GRUB2 boot menu
# Kernel and initrd live on RETROBOOT (P2, FAT32).
# Kernel root is RETROROOT (P3, SquashFS read-only).
# machine= on the kernel cmdline tells the launcher which RetroArch config to use.
#
# $root is set by the loader before this file runs:
#   EFI path:  embedded grub-early.cfg does search --label RETROBOOT
#   BIOS path: grub-install sets $root to the partition containing /boot/grub

set default=saved
set timeout=5
set timeout_style=menu

# Environment block on the FAT32 RETROBOOT partition for savedefault persistence.
set env_file=($root)/boot/grub/grubenv
load_env
if [ "${saved_entry}" ]; then
    set default="${saved_entry}"
fi

menuentry "Commodore 64" --id c64 {
    savedefault
    linux /boot/vmlinuz-lts root=LABEL=RETROROOT rootfstype=squashfs ro quiet machine=c64
    initrd /boot/initramfs-lts
}


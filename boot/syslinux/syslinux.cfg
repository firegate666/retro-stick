# RetroStick — Syslinux legacy BIOS config
# Syslinux is installed to the MBR by install_bootloader.sh.
# Its only job is to chainload into GRUB (installed to the VBR of partition 1),
# which then presents the machine selector menu.

PROMPT 0
TIMEOUT 0
DEFAULT grub

LABEL grub
    COM32 chain.c32
    APPEND hd0 1

# Amiga — RetroArch config overrides
# Applied on top of config/retroarch_base.cfg via --appendconfig.

video_shader_enable = "true"
video_shader = "shaders/crt-easymode.glslp"

# Amiga uses mouse; enable it for player 1
input_player1_mouse_index = "0"

system_directory = "/media/RETROGAMES/machines/amiga/system"
savefile_directory = "/media/RETROGAMES/machines/amiga/saves"
savestate_directory = "/media/RETROGAMES/machines/amiga/states"
content_directory = "/media/RETROGAMES/machines/amiga/disks"

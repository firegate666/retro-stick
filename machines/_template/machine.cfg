# <MACHINE> — RetroArch config overrides
# Applied on top of config/retroarch_base.cfg via --appendconfig.
# Replace <MACHINE> with the machine name everywhere below.

video_shader_enable = "false"

system_directory = "/media/RETROGAMES/machines/<MACHINE>/system"
savefile_directory = "/media/RETROGAMES/machines/<MACHINE>/saves"
savestate_directory = "/media/RETROGAMES/machines/<MACHINE>/states"
content_directory = "/media/RETROGAMES/machines/<MACHINE>/disks"

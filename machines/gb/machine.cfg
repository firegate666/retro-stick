# Game Boy / Game Boy Color — RetroArch config overrides
# Applied on top of config/retroarch_base.cfg via --appendconfig.

# DMG-style dot-matrix shader
video_shader_enable = "true"
video_shader = "shaders/handheld/dot-matrix.glslp"

# Preserve the square pixel look of the original screen
video_scale_integer = "true"
video_aspect_ratio = "1.000000"

system_directory = "/media/RETROGAMES/machines/gb/system"
savefile_directory = "/media/RETROGAMES/machines/gb/saves"
savestate_directory = "/media/RETROGAMES/machines/gb/states"
content_directory = "/media/RETROGAMES/machines/gb/disks"

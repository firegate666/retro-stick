# DOS — RetroArch config overrides
# Applied on top of config/retroarch_base.cfg via --appendconfig.

video_shader_enable = "false"

# DOS games vary in aspect ratio; auto is the safest default
video_aspect_ratio_auto = "true"

# Mouse support for DOS games
input_player1_mouse_index = "0"

system_directory = "/media/RETROGAMES/machines/dos/system"
savefile_directory = "/media/RETROGAMES/machines/dos/saves"
savestate_directory = "/media/RETROGAMES/machines/dos/states"
content_directory = "/media/RETROGAMES/machines/dos/disks"

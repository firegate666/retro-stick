# Game Boy Advance — RetroArch config overrides
# Applied on top of config/retroarch_base.cfg via --appendconfig.

video_shader_enable = "false"

# GBA native aspect ratio (3:2)
video_aspect_ratio = "1.500000"

system_directory = "/media/RETROGAMES/machines/gba/system"
savefile_directory = "/media/RETROGAMES/machines/gba/saves"
savestate_directory = "/media/RETROGAMES/machines/gba/states"
content_directory = "/media/RETROGAMES/machines/gba/disks"

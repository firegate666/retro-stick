# RetroStick — shared RetroArch base config
# Machine-specific machine.cfg files override these settings via --appendconfig.

# --- Video ---
video_fullscreen = "true"
video_vsync = "true"
video_driver = "sdl2"
video_smooth = "false"
video_scale_integer = "true"
video_aspect_ratio_auto = "true"

# --- Audio ---
audio_driver = "alsa"
audio_enable = "true"
audio_latency = "64"

# --- Hotkeys (keyboard) ---
# No enable-hotkey modifier; all hotkeys fire on their own key press.
input_enable_hotkey = "nul"
input_menu_toggle = "f12"
input_toggle_fullscreen = "f11"
input_screenshot = "f8"

# Disk control, save/load state, reset, and quit are accessed via the in-menu
# overlay opened with F12 — no dedicated hotkeys to avoid accidental triggers.

# --- Gamepad hotkey ---
# Select + Start opens the overlay (combo value 2).
input_menu_toggle_gamepad_combo = "2"

# --- Saving ---
# Autosave SRAM every 60 seconds so progress is not lost on power loss.
autosave_interval = "60"

# --- Misc ---
pause_nonactive = "false"
video_black_frame_insertion = "false"
